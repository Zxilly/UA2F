name: Build OpenWRT Package

on:
  push:
    paths-ignore:
      - '**.md'
    branches:
      - master
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - '**.md'
  release:
    types:
      - created

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libnetfilter-queue-dev libmnl-dev libnetfilter-conntrack-dev lcov libjson-c-dev lcov libpcap-dev

      - name: Build and install libubox
        working-directory: /tmp
        run: |
          git clone https://github.com/openwrt/libubox.git
          cd libubox
          mkdir build
          cd build
          cmake .. -DBUILD_LUA=OFF -DBUILD_EXAMPLES=OFF
          make
          sudo make install

      - name: Build and install libuci
        working-directory: /tmp
        run: |
          git clone https://github.com/openwrt/uci.git
          cd uci
          mkdir build
          cd build
          cmake .. -DBUILD_LUA=OFF
          make
          sudo make install

      - name: Generate pcap test data
        run: python3 test/gen_pcap.py

      - name: Run unit tests
        run: |
          cmake -S . -B build -DUA2F_BUILD_TESTS=ON -DUA2F_ENABLE_UCI=OFF
          cmake --build build
          ./build/ua2f_test
          ./build/ua2f_handler_test

      - name: Generate unit test coverage
        run: |
          cmake -S . -B build-coverage -DUA2F_BUILD_TESTS=ON -DUA2F_ENABLE_UCI=OFF
          cmake --build build-coverage
          cd build-coverage
          make coverage-lcov

      - name: Upload unit test coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          files: build-coverage/coverage.info
          flags: unittests
          fail_ci_if_error: true
          verbose: true
          use_oidc: true

  test-musl:
    name: Run unit tests (musl/Alpine)
    runs-on: ubuntu-latest
    container: alpine:latest
    steps:
      - name: Install dependencies
        run: |
          apk add --no-cache cmake make g++ git linux-headers python3 \
            libmnl-dev libnetfilter_queue-dev libnfnetlink-dev \
            libnetfilter_conntrack-dev libpcap-dev

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Generate pcap test data
        run: python3 test/gen_pcap.py

      - name: Build and run unit tests
        run: |
          cmake -S . -B build -DUA2F_BUILD_TESTS=ON -DUA2F_ENABLE_UCI=OFF -DUA2F_ENABLE_BACKTRACE=OFF
          cmake --build build
          ./build/ua2f_test
          ./build/ua2f_handler_test

  test-standalone:
    name: Run unit tests without uci support
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libnetfilter-queue-dev libmnl-dev libnetfilter-conntrack-dev lcov lcov libpcap-dev

      - name: Generate pcap test data
        run: python3 test/gen_pcap.py

      - name: Run unit tests
        run: |
          cmake -S . -B build -DUA2F_BUILD_TESTS=ON -DUA2F_ENABLE_UCI=OFF
          cmake --build build
          ./build/ua2f_test
          ./build/ua2f_handler_test

      - name: Generate unit test coverage (standalone)
        run: |
          cmake -S . -B build-coverage -DUA2F_BUILD_TESTS=ON -DUA2F_ENABLE_UCI=OFF
          cmake --build build-coverage
          cd build-coverage
          make coverage-lcov

      - name: Upload unit test coverage to Codecov (standalone)
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          files: build-coverage/coverage.info
          flags: unittests-standalone
          fail_ci_if_error: true
          verbose: true
          use_oidc: true

  test-integration:
    name: Run integration tests
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    strategy:
      matrix:
        cache: [ "-DUA2F_NO_CACHE=ON", "-DUA2F_NO_CACHE=OFF" ]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libnetfilter-queue-dev libmnl-dev libnetfilter-conntrack-dev lcov

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'

      - name: Install requirements
        run: |
          pip install -r scripts/requirements.txt --break-system-packages

      - name: Configure ipv6
        run: |
          echo "net.ipv6.conf.all.disable_ipv6=0" | sudo tee -a /etc/sysctl.conf
          echo "net.ipv6.conf.default.disable_ipv6=0" | sudo tee -a /etc/sysctl.conf
          echo "net.ipv6.conf.lo.disable_ipv6=0" | sudo tee -a /etc/sysctl.conf
          sudo sysctl -p

      - name: Debug IPv6
        run: |
          ip -6 addr
          sudo sysctl net.ipv6.conf.all.disable_ipv6
          sudo sysctl net.ipv6.conf.default.disable_ipv6
          sudo sysctl net.ipv6.conf.lo.disable_ipv6
          
          ping6 -c 4 ::1 || { echo "::1 is not reachable"; exit 1; }

      - name: Run integration tests
        run: |
          cmake -S . -B build -DUA2F_BUILD_TESTS=OFF -DUA2F_ENABLE_UCI=OFF -DUA2F_ENABLE_ASAN=ON ${{ matrix.cache }}
          cmake --build build
          sudo ./build/ua2f --version
          sudo -E $(which python3) scripts/test.py ./build/ua2f

      - name: Generate integration test coverage
        run: |
          # Build with coverage enabled for integration testing
          cmake -S . -B build-coverage -DUA2F_BUILD_TESTS=OFF -DUA2F_ENABLE_UCI=OFF ${{ matrix.cache }}
          cmake --build build-coverage
          cd build-coverage
          
          # Reset coverage counters
          make coverage-integration-reset
          
          # Run integration tests with coverage-enabled binary
          sudo ./ua2f --version
          sudo -E $(which python3) ../scripts/test.py ./ua2f
          
          # Process coverage data with lcov
          make coverage-integration-process
          
          # Fix ownership of all coverage files recursively
          sudo chown -R $(whoami):$(whoami) .
          
          # Ensure coverage files are readable
          find . -name "*.gcno" -o -name "*.gcda" -o -name "*.info" | xargs chmod 644
          
          # Debug: List coverage files and their permissions
          echo "Coverage files generated:"
          find . -name "*.gcno" -o -name "*.gcda" -o -name "*.info" | head -10 | xargs ls -la
          
          # Count coverage files
          gcno_count=$(find . -name "*.gcno" | wc -l)
          gcda_count=$(find . -name "*.gcda" | wc -l)
          info_count=$(find . -name "*.info" | wc -l)
          echo "Found $gcno_count .gcno files, $gcda_count .gcda files, and $info_count .info files"

      - name: Upload integration test coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          files: build-coverage/coverage-integration.info
          flags: integration
          fail_ci_if_error: true
          use_oidc: true
          verbose: true

      - name: Upload log
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: syslog-cache-${{ matrix.cache }}
          path: /var/log/syslog

  build:
    name: Build ${{ matrix.arch }} on ${{ matrix.version }}
    runs-on: ubuntu-latest
    needs:
      - test
      - test-standalone
      - test-musl
      - test-integration
    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64_cortex-a53
          - aarch64_cortex-a72
          - aarch64_generic
          - arm_cortex-a7_neon-vfpv4
          - arm_cortex-a9_vfpv3-d16
          - arm_cortex-a15_neon-vfpv4
          - mips_24kc
          - mipsel_24kc
          - x86_64
        version:
          - 23.05.5
          - 24.10.0

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Build
        uses: openwrt/gh-action-sdk@82c46b45db95e9e065293cc03724cca499dd2ddb # v10
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.version }}
          FEEDNAME: packages_ci
          PACKAGES: openwrt
          V: sc

      - name: Move created packages to project dir
        run: |
          mkdir -p tmp
          cp bin/packages/${{ matrix.arch }}/packages_ci/*.ipk tmp/ || true
          for f in tmp/*.ipk; do mv "$f" "${f/.ipk/-${{ matrix.version }}.ipk}" 2>/dev/null || true; done
          mv tmp/*.ipk . 2>/dev/null || true
          rm -rf tmp
          
      - name: Store packages
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: "!startsWith(github.ref, 'refs/tags/v')"
        with:
          name: ${{ matrix.arch }}-${{ github.sha }}-${{ matrix.version }}-packages
          path: "*.ipk"

      - name: Upload packages
        uses: svenstaro/upload-release-action@b98a3b12e86552593f3e4e577ca8a62aa2f3f22b # 2.11.4
        if: "startsWith(github.ref, 'refs/tags/v')"
        with:
          repo_token: ${{ github.token }}
          file: "*.ipk"
          tag: ${{ github.ref }}
          file_glob: true

      - name: Store logs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.arch }}-${{ github.sha }}-${{ matrix.version }}-logs
          path: logs/

      - name: Remove logs
        run: rm -rf logs/ || true